name: Build Desktop

on:
  workflow_call:
    inputs:
      version:
        description: "Release version to stamp into the build."
        type: string
        required: true

jobs:
  build:
    name: Desktop (${{ matrix.target.id }})
    strategy:
      fail-fast: false
      matrix:
        target:
          - { id: linux-x64, os: ubuntu-22.04 }
          - { id: windows-x64, os: windows-latest }
    runs-on: ${{ matrix.target.os }}
    env:
      APPIMAGE_EXTRACT_AND_RUN: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install Linux Tauri dependencies
        if: matrix.target.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf file

      - name: Stamp release version
        shell: bash
        run: bash .github/scripts/set-version.sh "${{ inputs.version }}"

      - name: Build desktop bundles
        working-directory: desktop
        run: |
          npm install
          npm run build

      - name: Collect installers
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          BUNDLE=desktop/src-tauri/target/release/bundle
          find "$BUNDLE" -type f \
            \( -name '*.deb' -o -name '*.msi' -o -name '*-setup.exe' \) \
            -print0 | while IFS= read -r -d '' f; do
              base="$(basename "$f")"
              cp "$f" "dist/${base// /-}"
            done
          ls -la dist

      - name: Upload desktop installers
        uses: actions/upload-artifact@v4
        with:
          name: dist-desktop-${{ matrix.target.id }}
          path: dist/*
          if-no-files-found: error
          retention-days: 1
