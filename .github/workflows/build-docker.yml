name: Build Docker Image

on:
  workflow_call:
    inputs:
      push:
        description: "When true, log in to GHCR and push the built image."
        type: boolean
        required: false
        default: false
      version:
        description: "Release version to stamp/tag (empty for development builds)."
        type: string
        required: false
        default: ""
      channel:
        description: "Release channel: dev | beta | release."
        type: string
        required: false
        default: "dev"

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: ${{ inputs.push && 'Build & Push' || 'Build' }} Image (${{ inputs.channel }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp release version
        if: inputs.version != ''
        run: bash .github/scripts/set-version.sh "${{ inputs.version }}"

      - name: Resolve image name & tags
        id: meta
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/voxeldash-one"
          SHA="$(git rev-parse --short HEAD)"
          TAGS=()
          case "${{ inputs.channel }}" in
            release)
              VERSION="${{ inputs.version }}"
              TAGS+=("${IMAGE}:latest" "${IMAGE}:release" "${IMAGE}:${VERSION}")
              if [[ "$VERSION" =~ ^([0-9]+)\.([0-9]+)\. ]]; then
                TAGS+=("${IMAGE}:${BASH_REMATCH[1]}.${BASH_REMATCH[2]}" "${IMAGE}:${BASH_REMATCH[1]}")
              fi
              ;;
            beta)
              TAGS+=("${IMAGE}:beta" "${IMAGE}:${{ inputs.version }}")
              ;;
            *)
              TAGS+=("${IMAGE}:dev" "${IMAGE}:dev-${SHA}")
              ;;
          esac
          {
            echo "image=${IMAGE}"
            echo "tags<<__EOF__"
            printf '%s\n' "${TAGS[@]}"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"
          printf 'Tags:\n%s\n' "${TAGS[*]}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: inputs.push
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=VoxelDash One
            org.opencontainers.image.description=Unified master backend for managing Minecraft servers
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://voxeldash.dev
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT
