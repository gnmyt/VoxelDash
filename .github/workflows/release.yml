name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  setup:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      version_type: ${{ steps.meta.outputs.version_type }}
      has_modrinth: ${{ steps.meta.outputs.has_modrinth }}
    steps:
      - name: Resolve version & channel
        id: meta
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi
          if [[ "$VERSION" == *-alpha* ]]; then
            VERSION_TYPE=alpha
          elif [[ "$VERSION" == *-* ]]; then
            VERSION_TYPE=beta
          else
            VERSION_TYPE=release
          fi
          if [[ -n "$MODRINTH_TOKEN" ]]; then HAS_MODRINTH=true; else HAS_MODRINTH=false; fi
          {
            echo "version=$VERSION"
            echo "prerelease=$PRERELEASE"
            echo "version_type=$VERSION_TYPE"
            echo "has_modrinth=$HAS_MODRINTH"
          } >> "$GITHUB_OUTPUT"
          echo "Tag $TAG -> version=$VERSION prerelease=$PRERELEASE type=$VERSION_TYPE modrinth=$HAS_MODRINTH"

  modules:
    name: Modules
    needs: setup
    uses: ./.github/workflows/build-modules.yml
    with:
      version: ${{ needs.setup.outputs.version }}
      release: true
    secrets: inherit

  one:
    name: VoxelDash One
    needs: setup
    uses: ./.github/workflows/build-one.yml
    with:
      version: ${{ needs.setup.outputs.version }}
      release: true
    secrets: inherit

  desktop:
    name: Desktop
    needs: setup
    uses: ./.github/workflows/build-desktop.yml
    with:
      version: ${{ needs.setup.outputs.version }}
    secrets: inherit

  docker:
    name: Docker
    needs: setup
    uses: ./.github/workflows/build-docker.yml
    with:
      push: true
      version: ${{ needs.setup.outputs.version }}
      channel: ${{ needs.setup.outputs.version_type == 'release' && 'release' || 'beta' }}
    secrets: inherit

  publish-maven:
    name: Publish API
    needs: [setup, modules]
    uses: ./.github/workflows/publish-maven.yml
    with:
      version: ${{ needs.setup.outputs.version }}
    secrets: inherit

  release:
    name: Finalize
    needs: [setup, modules, one, desktop]
    uses: ./.github/workflows/finalize-release.yml
    with:
      version: ${{ needs.setup.outputs.version }}
      prerelease: ${{ needs.setup.outputs.prerelease }}
    secrets: inherit

  modrinth:
    name: Modrinth
    needs: [setup, release]
    if: needs.setup.outputs.has_modrinth == 'true'
    uses: ./.github/workflows/publish-modrinth.yml
    with:
      version: ${{ needs.setup.outputs.version }}
      version_type: ${{ needs.setup.outputs.version_type }}
      changelog: ${{ needs.release.outputs.changelog }}
    secrets: inherit

  cleanup-on-failure:
    name: Cleanup on Failure
    needs: [setup, modules, one, desktop, docker, release]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Delete release and tag
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
              });
              console.log(`Deleted release ${release.id}`);
            } catch (e) {
              console.log(`Could not delete release: ${e.message}`);
            }
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tag}`,
              });
              console.log(`Deleted tag ${tag}`);
            } catch (e) {
              console.log(`Could not delete tag: ${e.message}`);
            }
