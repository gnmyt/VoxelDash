name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  BUILDKITE_ORG: voxeldash
  BUILDKITE_MAVEN_REGISTRY: maven

jobs:
  setup:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Resolve version & channel
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi
          echo "version=$VERSION"       >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Tag $TAG -> version=$VERSION prerelease=$PRERELEASE"

  build:
    name: Build ${{ matrix.module }}
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: spigot
            tool: maven
            webui: true
          - module: bungeecord
            tool: maven
            webui: true
          - module: vanilla
            tool: maven
            webui: true
          - module: fabric
            tool: gradle
            webui: true
          - module: forge
            tool: gradle
            webui: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Purge corrupt jars from Maven cache
        run: |
          find ~/.m2/repository -name '*.jar' -print0 \
            | while IFS= read -r -d '' j; do
                unzip -tqq "$j" >/dev/null 2>&1 \
                  || { echo "::warning::Removing corrupt jar $j"; rm -f "$j"; }
              done

      - name: Set up pnpm
        if: matrix.webui
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        if: matrix.webui
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Set up Gradle
        if: matrix.tool == 'gradle'
        uses: gradle/actions/setup-gradle@v4

      - name: Stamp release version
        run: bash .github/scripts/set-version.sh "${{ needs.setup.outputs.version }}"

      - name: Install voxeldash-api into local Maven repo
        run: mvn -B -ntp -f modules/api/pom.xml install -DskipTests

      - name: Build module (Maven)
        if: matrix.tool == 'maven'
        run: mvn -B -ntp -f modules/${{ matrix.module }}/pom.xml package -DskipTests

      - name: Build module (Gradle)
        if: matrix.tool == 'gradle'
        working-directory: modules/${{ matrix.module }}
        run: |
          chmod +x ./gradlew
          ./gradlew build --no-daemon

      - name: Stage release artifact
        id: stage
        run: |
          set -euo pipefail
          VERSION="${{ needs.setup.outputs.version }}"
          MODULE="${{ matrix.module }}"
          mkdir -p dist
          if [[ "${{ matrix.tool }}" == "maven" ]]; then
            SRC=$(ls modules/$MODULE/target/voxeldash-$MODULE-*.jar \
                  | grep -Ev '\-sources|\-javadoc' | head -n1)
          else
            SRC=$(ls modules/$MODULE/build/libs/voxeldash-*.jar \
                  | grep -Ev '\-dev|\-sources' | head -n1)
          fi
          cp "$SRC" "dist/voxeldash-$MODULE-$VERSION.jar"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.module }}
          path: dist/*.jar
          if-no-files-found: error
          retention-days: 1

  one:
    name: Build VoxelDash One (${{ matrix.target.id }})
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { id: linux-x64, bun: bun-linux-x64, bin: voxeldash-one, archive: tar.gz }
          - { id: windows-x64, bun: bun-windows-x64, bin: voxeldash-one.exe, archive: zip }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Stamp release version
        run: bash .github/scripts/set-version.sh "${{ needs.setup.outputs.version }}"

      - name: Build web UI
        working-directory: ui
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Compile single-file executable (${{ matrix.target.id }})
        working-directory: one
        run: |
          bun install --frozen-lockfile
          bun build src/index.js --compile --minify --target=${{ matrix.target.bun }} --outfile ${{ matrix.target.bin }}

      - name: Package release bundle
        run: |
          set -euo pipefail
          VERSION="${{ needs.setup.outputs.version }}"
          PKG="voxeldash-one-${VERSION}-${{ matrix.target.id }}"
          mkdir -p "stage/${PKG}/ui"
          cp "one/${{ matrix.target.bin }}" "stage/${PKG}/${{ matrix.target.bin }}"
          cp -r ui/dist "stage/${PKG}/ui/dist"
          mkdir -p dist
          if [ "${{ matrix.target.archive }}" = "zip" ]; then
            (cd stage && zip -qr "../dist/${PKG}.zip" "${PKG}")
          else
            tar -C stage -czf "dist/${PKG}.tar.gz" "${PKG}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-one-${{ matrix.target.id }}
          path: dist/*
          if-no-files-found: error
          retention-days: 1

  desktop:
    name: Build Desktop (${{ matrix.target.id }})
    needs: [setup, release]
    strategy:
      fail-fast: false
      matrix:
        target:
          - { id: linux-x64, os: ubuntu-22.04 }
          - { id: windows-x64, os: windows-latest }
    runs-on: ${{ matrix.target.os }}
    env:
      APPIMAGE_EXTRACT_AND_RUN: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install Linux Tauri dependencies
        if: matrix.target.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf file

      - name: Stamp release version
        shell: bash
        run: bash .github/scripts/set-version.sh "${{ needs.setup.outputs.version }}"

      - name: Build desktop bundles
        working-directory: desktop
        run: |
          npm install
          npm run build

      - name: Collect installers
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          BUNDLE=desktop/src-tauri/target/release/bundle
          find "$BUNDLE" -type f \
            \( -name '*.AppImage' -o -name '*.deb' -o -name '*.msi' -o -name '*-setup.exe' \) \
            -print0 | while IFS= read -r -d '' f; do
              base="$(basename "$f")"
              cp "$f" "dist/${base// /-}"
            done
          ls -la dist

      - name: Upload installers to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*

  deploy-maven:
    name: Publish API to Buildkite
    needs: [setup, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Purge corrupt jars from Maven cache
        run: |
          find ~/.m2/repository -name '*.jar' -print0 \
            | while IFS= read -r -d '' j; do
                unzip -tqq "$j" >/dev/null 2>&1 \
                  || { echo "::warning::Removing corrupt jar $j"; rm -f "$j"; }
              done

      - name: Stamp release version
        run: bash .github/scripts/set-version.sh "${{ needs.setup.outputs.version }}"

      - name: Configure Maven settings for Buildkite
        env:
          BUILDKITE_API_TOKEN: ${{ secrets.BUILDKITE_API_TOKEN }}
        run: |
          if [ -z "$BUILDKITE_API_TOKEN" ]; then
            echo "::error::BUILDKITE_API_TOKEN secret must be set"
            exit 1
          fi
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <servers>
              <server>
                <id>buildkite</id>
                <configuration>
                  <httpHeaders>
                    <property>
                      <name>Authorization</name>
                      <value>Bearer ${BUILDKITE_API_TOKEN}</value>
                    </property>
                  </httpHeaders>
                </configuration>
              </server>
            </servers>
          </settings>
          EOF

      - name: Deploy voxeldash-api
        run: |
          REPO_URL="https://packages.buildkite.com/${BUILDKITE_ORG}/${BUILDKITE_MAVEN_REGISTRY}/maven2/"
          mvn -B -ntp -f modules/api/pom.xml deploy -DskipTests \
            -DaltDeploymentRepository="buildkite::${REPO_URL}"

  release:
    name: Publish Release
    needs: [setup, build, one]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Stamp release version
        run: bash .github/scripts/set-version.sh "${{ needs.setup.outputs.version }}"

      - name: Commit & push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff-index --quiet HEAD; then
            echo "No version changes to commit"
          else
            git commit -m "chore: bump version to ${{ needs.setup.outputs.version }} [skip ci]"
            git push origin "HEAD:${{ github.event.repository.default_branch }}"
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: VoxelDash ${{ needs.setup.outputs.version }}
          draft: false
          prerelease: ${{ needs.setup.outputs.prerelease }}
          generate_release_notes: true
          files: |
            dist/*.jar
            dist/voxeldash-one-*

  cleanup-on-failure:
    name: Cleanup on Failure
    needs: [setup, build, one, release]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Delete release and tag
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
              });
              console.log(`Deleted release ${release.id}`);
            } catch (e) {
              console.log(`Could not delete release: ${e.message}`);
            }
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tag}`,
              });
              console.log(`Deleted tag ${tag}`);
            } catch (e) {
              console.log(`Could not delete tag: ${e.message}`);
            }
