name: VoxelDash
version: ${project.version}
main: de.gnm.voxeldash.VoxelDashSpigot
api-version: '1.13'
folia-supported: true
description: A web-based dashboard for managing your Minecraft server
author: GNM
website: https://voxeldash.dev/
load: STARTUP

commands:
  voxeldash:
    description: Manage your VoxelDash web account
    usage: /voxeldash password <new-password>

permissions:
  voxeldash.password:
    description: Allows creating and updating your own VoxelDash web account
    default: op
